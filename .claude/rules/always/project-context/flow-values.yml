# プロジェクト実装フロー設定（スキーマ正本: ~/.claude/rules/scoped/agent-config/project-structure/rule.md）

# ドメイン知識
domain_glossary: null
design_system: null
adr_dir: null

# ソース構造
design_docs: null
portal_dir: null

# レビューゲート
review_gates: {}

# PR 設定
pr:
  template: null
  required_sections: []
  critical_globs:
    - "index.html"
    - "scripts/**"
    - "docs/**"

# ルート判定の閾値
classify:
  quick_max_files: 2
  quick_excludes:
    - migration
    - schema_change
    - api_contract
    - ui_component

# プリフライトチェック設定
preflight:
  skip_tools: []
