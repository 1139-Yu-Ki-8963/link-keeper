(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.dataset.theme = saved;
  }
})();

function currentTheme() {
  const t = document.documentElement.dataset.theme;
  if (t === 'dark' || t === 'light') return t;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function updateThemeIcon() {
  document.getElementById('theme-icon').textContent =
    currentTheme() === 'dark' ? 'light_mode' : 'dark_mode';
}

function toggleTheme() {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
  updateThemeIcon();
}

const state = { category: null, type: null, tool: null, mechanism: null, theme: null, keyword: '' };

function init() {
  renderFilters();
  applyFilters();
  document.getElementById('search').addEventListener('input', e => {
    state.keyword = e.target.value;
    applyFilters();
  });
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  updateThemeIcon();
}

function renderFilters() {
  // カテゴリチップ
  const catContainer = document.getElementById('filter-categories');
  VOCAB.categories.forEach(c => {
    const btn = createChip(c, true);
    btn.onclick = () => { state.category = state.category === c ? null : c; applyFilters(); updateChips(); };
    catContainer.appendChild(btn);
  });

  // 種類チップ
  const typeContainer = document.getElementById('filter-types');
  VOCAB.types.forEach(t => {
    const btn = createChip(t);
    btn.onclick = () => { state.type = state.type === t ? null : t; applyFilters(); updateChips(); };
    typeContainer.appendChild(btn);
  });

  // 対象ツールチップ
  const toolContainer = document.getElementById('filter-tools');
  VOCAB.tools.forEach(t => {
    const btn = createChip(t);
    btn.onclick = () => { state.tool = state.tool === t ? null : t; applyFilters(); updateChips(); };
    toolContainer.appendChild(btn);
  });

  // 仕組みチップ
  const mechanismContainer = document.getElementById('filter-mechanisms');
  VOCAB.mechanisms.forEach(m => {
    const btn = createChip(m);
    btn.onclick = () => { state.mechanism = state.mechanism === m ? null : m; applyFilters(); updateChips(); };
    mechanismContainer.appendChild(btn);
  });

  // テーマチップ
  const themeContainer = document.getElementById('filter-themes');
  VOCAB.themes.forEach(t => {
    const btn = createChip(t);
    btn.onclick = () => { state.theme = state.theme === t ? null : t; applyFilters(); updateChips(); };
    themeContainer.appendChild(btn);
  });
}

function createChip(text, big) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (big ? ' chip-big' : '');
  btn.textContent = text;
  btn.dataset.value = text;
  return btn;
}

function updateChips() {
  document.querySelectorAll('#filter-categories .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.category);
  });
  document.querySelectorAll('#filter-types .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.type);
  });
  document.querySelectorAll('#filter-tools .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.tool);
  });
  document.querySelectorAll('#filter-mechanisms .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.mechanism);
  });
  document.querySelectorAll('#filter-themes .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.theme);
  });
  const clearBtn = document.getElementById('clear-filters');
  clearBtn.style.display = (state.category || state.type || state.tool || state.mechanism || state.theme || state.keyword) ? '' : 'none';
}

function applyFilters() {
  const filtered = RESOURCES.filter(r => {
    if (state.category && r.category !== state.category) return false;
    if (state.type && r.type !== state.type) return false;
    if (state.tool && !r.tools.includes(state.tool)) return false;
    if (state.mechanism && !r.mechanisms.includes(state.mechanism)) return false;
    if (state.theme && !r.themes.includes(state.theme)) return false;
    if (state.keyword) {
      const kw = state.keyword.toLowerCase();
      if (!r.title.toLowerCase().includes(kw) && !(r.description || '').toLowerCase().includes(kw)) return false;
    }
    return true;
  });
  renderResources(filtered);
  document.getElementById('count').textContent = filtered.length + ' 件';
  updateChips();
}

function renderResources(list) {
  const container = document.getElementById('resources');
  if (!list.length) {
    container.innerHTML = '<p style="color:var(--text-tertiary);padding:2rem 0;text-align:center">検索語を変えるか、絞り込みをクリアしてください</p>';
    return;
  }
  container.innerHTML = list.map(r => `
    <article class="resource-card">
      <div class="tags">
        <span class="tag-outlined">${esc(r.category)}</span>
        <span class="tag-filled">${esc(r.type)}</span>
        ${(r.tools || []).map(t => `<span class="tag-subtle">${esc(t)}</span>`).join('')}
        ${(r.mechanisms || []).map(m => `<span class="tag-subtle">${esc(m)}</span>`).join('')}
        ${(r.themes || []).map(t => `<span class="tag-subtle">${esc(t)}</span>`).join('')}
      </div>
      <a href="${esc(r.url)}" target="_blank" rel="noopener noreferrer" class="resource-title">
        ${esc(r.title)} <span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:middle">open_in_new</span>
      </a>
      ${r.description ? `<p class="resource-desc">${esc(r.description)}</p>` : ''}
      ${r.memo ? `<p class="resource-memo"><span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:middle">lightbulb</span> 一言メモ：${esc(r.memo)}</p>` : ''}
      <span class="resource-url">${esc(r.url)}</span>
    </article>
  `).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function clearAll() {
  state.category = null; state.type = null; state.tool = null; state.mechanism = null; state.theme = null; state.keyword = '';
  document.getElementById('search').value = '';
  applyFilters();
}

document.addEventListener('DOMContentLoaded', init);
</script>
