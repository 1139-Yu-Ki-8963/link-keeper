const state = { category: null, topic: null, type: null, keyword: '' };

function init() {
  renderFilters();
  applyFilters();
  document.getElementById('search').addEventListener('input', e => {
    state.keyword = e.target.value;
    applyFilters();
  });
}

function renderFilters() {
  // カテゴリチップ
  const catContainer = document.getElementById('filter-categories');
  VOCAB.categories.forEach(c => {
    const btn = createChip(c, true);
    btn.onclick = () => { state.category = state.category === c ? null : c; applyFilters(); updateChips(); };
    catContainer.appendChild(btn);
  });

  // 話題チップ（2グループ）
  const ccContainer = document.getElementById('filter-topics-cc');
  const themeContainer = document.getElementById('filter-topics-theme');
  VOCAB.topics.forEach(t => {
    const btn = createChip(t.name);
    btn.onclick = () => { state.topic = state.topic === t.name ? null : t.name; applyFilters(); updateChips(); };
    (t.group === 'Claude Code' ? ccContainer : themeContainer).appendChild(btn);
  });

  // 種類チップ
  const typeContainer = document.getElementById('filter-types');
  VOCAB.types.forEach(t => {
    const btn = createChip(t);
    btn.onclick = () => { state.type = state.type === t ? null : t; applyFilters(); updateChips(); };
    typeContainer.appendChild(btn);
  });
}

function createChip(text, big) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (big ? ' chip-big' : '');
  btn.textContent = text;
  btn.dataset.value = text;
  return btn;
}

function updateChips() {
  document.querySelectorAll('#filter-categories .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.category);
  });
  document.querySelectorAll('#filter-topics-cc .chip, #filter-topics-theme .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.topic);
  });
  document.querySelectorAll('#filter-types .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.value === state.type);
  });
  const clearBtn = document.getElementById('clear-filters');
  clearBtn.style.display = (state.category || state.topic || state.type || state.keyword) ? '' : 'none';
}

function applyFilters() {
  const filtered = RESOURCES.filter(r => {
    if (state.category && r.category !== state.category) return false;
    if (state.topic && r.topic !== state.topic) return false;
    if (state.type && r.type !== state.type) return false;
    if (state.keyword) {
      const kw = state.keyword.toLowerCase();
      if (!r.title.toLowerCase().includes(kw) && !(r.description || '').toLowerCase().includes(kw)) return false;
    }
    return true;
  });
  renderResources(filtered);
  document.getElementById('count').textContent = filtered.length + ' 件';
  updateChips();
}

function renderResources(list) {
  const container = document.getElementById('resources');
  if (!list.length) {
    container.innerHTML = '<p style="color:var(--text-tertiary);padding:2rem 0;text-align:center">検索語を変えるか、絞り込みをクリアしてください</p>';
    return;
  }
  container.innerHTML = list.map(r => `
    <article class="resource-card">
      <div class="tags">
        <span class="tag-outlined">${esc(r.category)}</span>
        <span class="tag-filled">${esc(r.type)}</span>
        <span class="tag-subtle">${esc(r.topic)}</span>
      </div>
      <a href="${esc(r.url)}" target="_blank" rel="noopener noreferrer" class="resource-title">
        ${esc(r.title)} <span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:middle">open_in_new</span>
      </a>
      ${r.description ? `<p class="resource-desc">${esc(r.description)}</p>` : ''}
      ${r.memo ? `<p class="resource-memo"><span class="material-symbols-outlined" style="font-size:0.875rem;vertical-align:middle">lightbulb</span> 一言メモ：${esc(r.memo)}</p>` : ''}
      <span class="resource-url">${esc(r.url)}</span>
    </article>
  `).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function clearAll() {
  state.category = null; state.topic = null; state.type = null; state.keyword = '';
  document.getElementById('search').value = '';
  applyFilters();
}

document.addEventListener('DOMContentLoaded', init);
</script>
